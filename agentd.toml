default_provider = "mock"

[providers.cli]
command = "cat"
args = []
prompt_mode = "stdin"
prompt_flag = "--prompt"
runtime_dir = "./.agentd/runtime"
plan_command = "cat"
plan_args = []
plan_goal_mode = "stdin"
plan_goal_flag = "--goal"
plan_output_format = "yaml"

[providers.http]
endpoint = "http://localhost:8080/run-agent"
auth_mode = "none"
api_key_header = "x-api-key"

[providers.sandbox]
# Sandbox runtime: "process" or "docker"
runtime = "process"
# Working directory for sandboxed agents
workdir = "./.agentd/sandbox"
# Allowed commands to execute (empty = all allowed)
allowed_commands = []
# Allowed read paths (empty = all allowed)
allowed_read_paths = []
# Allowed write paths (empty = all allowed)
allowed_write_paths = []
# Enable command execution tracing (logs with metadata)
trace_commands = true
# Enable filesystem diff tracing (before/after snapshots)
trace_diff = true
